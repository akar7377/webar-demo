<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Monument Demo</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* Top Title */
    .title {
      position: absolute;
      top: 15px;
      width: 100%;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      color: white;
      text-shadow: 0 0 10px black;
      z-index: 10;
    }

    /* Bottom UI Panel */
    #ui {
      position: absolute;
      bottom: 25px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 15px;
      z-index: 10;
    }

    .model-btn {
      padding: 12px 20px;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      transition: all 0.3s ease;
    }

    .model-btn:hover {
      transform: scale(1.07);
      opacity: 0.9;
    }

    .model-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>

  <!-- Title -->
  <div class="title">
    Wonders of the World AR
  </div>

  <!-- Button UI -->
  <div id="ui">
    <button class="model-btn" onclick="showTaj()">Taj Mahal</button>
    <button class="model-btn" onclick="showAngkor()">Angkor Wat</button>
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; debugUIEnabled: false;">

    <a-marker preset="hiro">

      <!-- Taj Mahal -->
      <a-entity
        id="taj"
        gltf-model="Tajtexturedfinal.glb"
        scale="0.1 0.1 0.1"
        position="0 0.15 0"
        visible="true">
      </a-entity>

      <!-- Angkor Wat -->
      <a-entity
        id="angkor"
        gltf-model="models/texturedankgor.glb"
        scale="0.00025 0.00025 0.00025"
        position="0 0.05 0"
        visible="false">
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    function showTaj() {
      document.getElementById("taj").setAttribute("visible", true);
      document.getElementById("angkor").setAttribute("visible", false);
    }

    function showAngkor() {
      document.getElementById("taj").setAttribute("visible", false);
      document.getElementById("angkor").setAttribute("visible", true);
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>World Heritage AR Explorer</title>

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(to bottom, #e8cfa4, #d2a679);
color:#3b2b1a;
text-align:center;
}

/* HEADER */

header{
padding:60px 20px 40px 20px;
}

h1{
font-size:48px;
margin-bottom:10px;
}

.team{
font-size:20px;
margin-bottom:30px;
}

/* BUTTON */

.enter-btn{
padding:18px 40px;
font-size:20px;
background:#8b5e34;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.3s;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.enter-btn:hover{
background:#6d4727;
transform:scale(1.05);
}

/* MONUMENT SECTION */

.section{
margin-top:60px;
padding:20px;
}

.monument-grid{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:25px;
}

.monument{
background:#f4e2c4;
padding:18px;
border-radius:14px;
width:170px;
box-shadow:0 6px 14px rgba(0,0,0,0.2);
transition:all 0.3s ease;
text-align:center;
}

.monument img{
width:100%;
border-radius:10px;
}

.monument p{
margin-top:10px;
font-weight:bold;
font-size:16px;
}

.monument:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}
/* FOOTER */

footer{
margin-top:60px;
padding:20px;
font-size:14px;
opacity:0.8;
}

</style>

</head>

<body>

<header>

<h1>World Heritage AR Explorer</h1>

<div class="team">
Created by Team <b>Get a Reality</b>
</div>

<button class="enter-btn" onclick="enterAR()">
Enter the AR Experience
</button>

</header>

<section class="section">

<h2>Discover World Heritage Sites</h2>

<div class="monument-grid">

<div class="monument">

<img src="tajmahal.jpg">
<p>Taj Mahal</p>
</div>
  
<img src="Angkorwat.jpg">
<p>Angkor Wat</p>
</div>

</div>

</section>

<footer>
Experience history through Augmented Reality
</footer>

<script>

function enterAR(){
window.location.href="heritage.html";
}

</script>

</body>

</html>

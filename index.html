<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Wonders of the World AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body{
margin:0;
overflow:hidden;
background:#1C1A18;
font-family:Georgia, serif;
}

.title{
position:fixed;
top:20px;
width:100%;
text-align:center;
color:#F3EBDD;
font-size:24px;
letter-spacing:3px;
z-index:10;
}

#ui{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:12px;
background:rgba(0,0,0,0.5);
padding:15px;
border-radius:10px;
z-index:999;
}

.model-btn{
padding:10px 20px;
border:1px solid #C6A75E;
background:#3A2F23;
color:#F3EBDD;
cursor:pointer;
border-radius:6px;
}

.active{
background:#C6A75E;
color:black;
}
</style>
</head>

<body>

<div class="title">Wonders of the World AR</div>

<div id="ui">
<button id="tajBtn" class="model-btn active" onclick="showTaj()">Taj Mahal</button>
<button id="angkorBtn" class="model-btn" onclick="showAngkor()">Angkor Wat</button>
</div>

<a-scene embedded vr-mode-ui="enabled:false"
arjs="sourceType:webcam; debugUIEnabled:false;">

<a-marker preset="hiro">

<!-- TAJ GROUP -->
<a-entity id="tajGroup" visible="true">

<a-entity
id="taj"
gltf-model="Tajtexturedfinal.glb"
scale="0.2 0.2 0.2"
position="0 -0.3 0"
animation__rise="property: position; from:0 -0.3 0; to:0 0 0; dur:2000; startEvents:startAnim">
</a-entity>

</a-entity>

<!-- ANGKOR GROUP -->
<a-entity id="angkorGroup" visible="false">

<a-entity
id="angkor"
gltf-model="models/TajtextureFinalfr.glb"
scale="0.02 0.02 0.02"
position="0 -0.3 0"
animation__rise="property: position; from:0 -0.3 0; to:0 0 0; dur:2000; startEvents:startAnim">
</a-entity>

<a-sphere
position="0 0.27 0"
radius="0.03"
color="blue"
class="clickable"
hotspot="text: Angkor Wat has five lotus shaped towers">
</a-sphere>

<a-sphere
position="0.4 0.2 0.3"
radius="0.03"
color="blue"
class="clickable"
hotspot="text: Angkor Wat is the largest religious monument in the world">
</a-sphere>

</a-entity>

</a-marker>

<!-- CAMERA UI -->

<a-entity camera look-controls>

<a-cursor
raycaster="objects: .clickable"
fuse="true"
fuse-timeout="800"
material="color:white">
</a-cursor>

<!-- INFO BOX -->

<a-entity id="infoBox" position="0 -0.25 -0.8" visible="false">

<a-plane
width="1.6"
height="0.9"
color="#222"
opacity="0.9">
</a-plane>

<a-text
id="infoText"
value=""
align="center"
color="white"
width="1.5"
position="0 0 0.01">
</a-text>

</a-entity>

<!-- EXIT BUTTON -->

<a-plane
id="exitBtn"
position="0 -0.8 -0.8"
width="0.5"
height="0.25"
color="red"
visible="false"
class="clickable">
</a-plane>

<a-text
id="exitText"
value="EXIT"
align="center"
color="white"
width="2"
position="0 -0.8 -0.79"
visible="false">
</a-text>

</a-entity>

</a-scene>

<script>

AFRAME.registerComponent("hotspot",{
schema:{text:{type:"string"}},

init:function(){

this.el.addEventListener("click",()=>{

let text=document.querySelector("#infoText")
let box=document.querySelector("#infoBox")
let exitBtn=document.querySelector("#exitBtn")
let exitText=document.querySelector("#exitText")

let taj=document.querySelector("#taj")
let angkor=document.querySelector("#angkor")

text.setAttribute("value",this.data.text)

box.setAttribute("visible",true)
exitBtn.setAttribute("visible",true)
exitText.setAttribute("visible",true)

/* zoom monument */

if(document.querySelector("#tajGroup").getAttribute("visible")){
taj.setAttribute("animation",
"property: scale; to:0.35 0.35 0.35; dur:600")
}

if(document.querySelector("#angkorGroup").getAttribute("visible")){
angkor.setAttribute("animation",
"property: scale; to:0.05 0.05 0.05; dur:600")
}

})

}
})

/* EXIT BUTTON */

document.querySelector("#exitBtn").addEventListener("click",()=>{

let taj=document.querySelector("#taj")
let angkor=document.querySelector("#angkor")

document.querySelector("#infoBox").setAttribute("visible",false)
document.querySelector("#exitBtn").setAttribute("visible",false)
document.querySelector("#exitText").setAttribute("visible",false)

taj.setAttribute("scale","0.2 0.2 0.2")
angkor.setAttribute("scale","0.02 0.02 0.02")

})

/* MARKER FOUND */

document.querySelector("a-marker").addEventListener("markerFound",()=>{

let taj=document.querySelector("#taj")
let angkor=document.querySelector("#angkor")

if(document.querySelector("#tajGroup").getAttribute("visible")){
taj.emit("startAnim")
}

if(document.querySelector("#angkorGroup").getAttribute("visible")){
angkor.emit("startAnim")
}

})

function showTaj(){

document.querySelector("#tajGroup").setAttribute("visible",true)
document.querySelector("#angkorGroup").setAttribute("visible",false)

document.getElementById("tajBtn").classList.add("active")
document.getElementById("angkorBtn").classList.remove("active")

}

function showAngkor(){

document.querySelector("#tajGroup").setAttribute("visible",false)
document.querySelector("#angkorGroup").setAttribute("visible",true)

document.getElementById("tajBtn").classList.remove("active")
document.getElementById("angkorBtn").classList.add("active")

}

/* TAJ HOTSPOTS */

document.querySelector("#taj").addEventListener("model-loaded",function(){

let taj=document.querySelector("#taj")

let s1=document.createElement("a-sphere")
s1.setAttribute("position","0 2 0")
s1.setAttribute("radius","0.3")
s1.setAttribute("color","red")
s1.setAttribute("class","clickable")
s1.setAttribute("hotspot","text: Taj Mahal central dome rises about 73 meters")

let s2=document.createElement("a-sphere")
s2.setAttribute("position","3.25 1 3.75")
s2.setAttribute("radius","0.3")
s2.setAttribute("color","red")
s2.setAttribute("class","clickable")
s2.setAttribute("hotspot","text: Taj Mahal has four outward leaning minarets")

let s3=document.createElement("a-sphere")
s3.setAttribute("position","0 -2 8")
s3.setAttribute("radius","0.3")
s3.setAttribute("color","red")
s3.setAttribute("class","clickable")
s3.setAttribute("hotspot","text: The Taj complex follows a Mughal Charbagh garden layout")

taj.appendChild(s1)
taj.appendChild(s2)
taj.appendChild(s3)

})

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Wonders of the World AR</title>

<!-- AFRAME -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- ARJS -->
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body{
margin:0;
overflow:hidden;
background:#1C1A18;
font-family:Georgia, serif;
}

.title{
position:fixed;
top:20px;
width:100%;
text-align:center;
color:#F3EBDD;
font-size:24px;
letter-spacing:3px;
z-index:10;
}

#ui{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:12px;
background:rgba(0,0,0,0.5);
padding:15px;
border-radius:10px;
pointer-events:auto;
z-index:999;
}

.model-btn{
padding:10px 20px;
border:1px solid #C6A75E;
background:#3A2F23;
color:#F3EBDD;
cursor:pointer;
border-radius:6px;
}

.active{
background:#C6A75E;
color:black;
}
</style>
</head>

<body>

<div class="title">
Wonders of the World AR
</div>

<div id="ui">
<button id="tajBtn" class="model-btn active" onclick="showTaj()">Taj Mahal</button>
<button id="angkorBtn" class="model-btn" onclick="showAngkor()">Angkor Wat</button>
<button class="model-btn" onclick="startStory()">Start Story</button>
</div>

<a-scene embedded vr-mode-ui="enabled:false"
arjs="sourceType:webcam; debugUIEnabled:false;">

<a-marker preset="hiro">

<!-- INFO PANEL -->

  <a-text
id="infoPanel"
value=""
position="0 0.8 0"
visible="false"
look-at="[camera]"
align="center"
color="white"
width="2">
</a-text>
  
<!-- TAJ GROUP -->

<a-entity id="tajGroup" visible="true">

<a-entity
id="taj"
gltf-model="Tajtexturedfinal.glb"
scale="0.2 0.2 0.2"
position="-0.35 -0.3 0"
animation__rise="property: position; from:0 -0.3 0; to:0 0 0; dur:2000; startEvents:startAnim">
</a-entity>

<!-- Taj Hotspots -->

<a-sphere
position="-0.35 0.45 0"
radius="0.1"
color="red"
class="clickable"
hotspot="text: Taj Mahal central dome rises about 73 meters high">
</a-sphere>

<a-sphere
position="-0.7 0.25 0"
radius="0.1"
color="red"
class="clickable"
hotspot="text: Taj Mahal has four minarets that lean outward">
</a-sphere>

<a-sphere
position="=0.35 -0.05 0.35"
radius="0.1"
color="red"
class="clickable"
hotspot="text: The Taj complex uses a Mughal Charbagh garden layout">
</a-sphere>

</a-entity>

<!-- ANGKOR GROUP -->

<a-entity id="angkorGroup" visible="false">
  
<a-entity
id="angkor"
gltf-model="models/texturedAngkor.glb"
scale="1 1 1"
position="0 0.1 0"
animation__rise="property: position; from:0 -0.3 0; to:0 0 0; dur:2000; startEvents:startAnim">
</a-entity>

<!-- Angkor Hotspots -->

<a-sphere
position="0 0.4 0"
radius="0.1"
color="blue"
class="clickable"
hotspot="text: Angkor Wat has five lotus shaped towers">
</a-sphere>

<a-sphere
position="0.3 0.25 0.2"
radius="0.1"
color="blue"
class="clickable"
hotspot="text: Angkor Wat is the largest religious monument in the world">
</a-sphere>

</a-entity>

</a-marker>

<a-entity camera look-controls>

<a-cursor
raycaster="objects: .clickable"
fuse="true"
fuse-timeout="800"
material="color:white">
</a-cursor>

</a-entity>

</a-scene>

<script>

  AFRAME.registerComponent("hotspot", {
  schema:{text:{type:"string"}},

  init:function(){
    this.el.addEventListener("click", ()=>{
      console.log("hotspot clicked")
      let panel=document.querySelector("#infoPanel")
      panel.setAttribute("value", this.data.text)
      panel.setAttribute("visible", true)
    })
  }
})
function showTaj(){
document.querySelector("#tajGroup").setAttribute("visible","true")
document.querySelector("#angkorGroup").setAttribute("visible","false")

document.getElementById("tajBtn").classList.add("active")
document.getElementById("angkorBtn").classList.remove("active")
}

function showAngkor(){
document.querySelector("#tajGroup").setAttribute("visible","false")
document.querySelector("#angkorGroup").setAttribute("visible","true")

document.getElementById("tajBtn").classList.remove("active")
document.getElementById("angkorBtn").classList.add("active")
}

function startStory(){
let taj=document.querySelector("#taj")
let angkor=document.querySelector("#angkor")

if(document.querySelector("#tajGroup").getAttribute("visible") === true){
taj.emit("startAnim")
}

if(document.querySelector("#angkorGroup").getAttribute("visible") === true){
angkor.emit("startAnim")
}
}
function showInfo(part){

let panel=document.querySelector("#infoPanel")

if(part==="dome"){
panel.setAttribute("value",
"Taj Mahal central dome rises about 73 meters high."
)
}

if(part==="minaret"){
panel.setAttribute("value",
"Taj Mahal has four minarets that lean outward for protection."
)
}

if(part==="garden"){
panel.setAttribute("value",
"The Taj complex uses the Mughal Charbagh garden layout."
)
}

if(part==="tower"){
panel.setAttribute("value",
"Angkor Wat has five lotus-shaped towers symbolizing Mount Meru."
)
}

if(part==="temple"){
panel.setAttribute("value",
"Angkor Wat is the largest religious monument in the world."
)
}

panel.setAttribute("visible",true)

}

</script>

</body>
</html>

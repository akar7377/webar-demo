<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Monument Demo</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: "Georgia", serif;
    background: #1C1A18;
  }

  /* TITLE */
  .title {
    position: fixed;
    top: 20px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 24px;
    letter-spacing: 3px;
    color: #F3EBDD;
    text-shadow: 0 0 20px rgba(0,0,0,0.8);
    z-index: 20;
  }

  /* BUTTON CONTAINER */
  #ui {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 15px;
    z-index: 20;

    padding: 15px 25px;
    border-radius: 12px;

    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
  }

  /* BUTTON STYLE */
  .model-btn {
    padding: 12px 22px;
    border-radius: 6px;
    border: 1px solid #C6A75E;
    font-size: 15px;
    letter-spacing: 1px;
    color: #F3EBDD;
    cursor: pointer;
    background: #3A2F23;
    transition: all 0.25s ease;
  }

  .model-btn:hover {
    background: #6B4F2A;
    transform: translateY(-2px);
  }

  .active {
    background: #C6A75E;
    color: #1C1A18;
  }
</style>
</head>

<body>

  <!-- Title -->
  <div class="title">
    Wonders of the World AR
  </div>

  <!-- Button UI -->
  <div id="ui">
  <button id="tajBtn" class="model-btn active" onclick="showTaj()">Taj Mahal</button>
  <button id="angkorBtn" class="model-btn" onclick="showAngkor()">Angkor Wat</button>
  <button onclick="startStory()">Start Story</button>
</div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; debugUIEnabled: false;">

    <a-marker preset="hiro">

      <!-- Taj Mahal -->
      <a-entity
  id="taj"
  gltf-model="models/taj.glb"
  scale="0.01 0.01 0.01"
  position="0 -0.3 0"
  visible="false"

  animation__rise="property: position; from: 0 -0.3 0; to: 0 0 0; dur: 2000; easing: easeOutCubic; startEvents: startAnim"

  animation__rotate="property: rotation; to: 0 360 0; dur: 20000; loop: true; easing: linear; startEvents: startAnim">
</a-entity>

      <!-- Angkor Wat -->

      <a-entity
  id="angkor"
  gltf-model="models/texturedankgor.glb"
  scale="0.0003 0.0003 0.0003"
  position="0 -0.8 0.5"
  visible="false"

  animation__rise="property: position; from: 0 -0.8 0.5; to: 0.3 -0.5 0.5; dur: 2000; easing: easeOutCubic; startEvents: startAnim"

  animation__rotate="property: rotation; to: 0 360 0; dur: 20000; loop: true; easing: linear; startEvents: startAnim">
</a-entity>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    
function showTaj() {
  document.getElementById("taj").setAttribute("visible", true);
  document.getElementById("angkor").setAttribute("visible", false);

  document.getElementById("tajBtn").classList.add("active");
  document.getElementById("angkorBtn").classList.remove("active");
}

function showAngkor() {
  document.getElementById("taj").setAttribute("visible", false);
  document.getElementById("angkor").setAttribute("visible", true);

  document.getElementById("tajBtn").classList.remove("active");
  document.getElementById("angkorBtn").classList.add("active");
}
    
function startStory() {

  const taj = document.querySelector("#taj");
  const angkor = document.querySelector("#angkor");

  if (taj.getAttribute("visible")) {
    taj.emit("startAnim");
  }

  if (angkor.getAttribute("visible")) {
    angkor.emit("startAnim");
  }

}
</script>

</body>
</html>

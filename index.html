<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Monument Demo</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

  <!-- Simple UI Overlay -->
  <div id="ui" style="
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      color: white;
      font-family: Arial;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 8px;">
    AR Demo Running
  </div>

  <a-scene
      embedded
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; debugUIEnabled: false;">

    <!-- HIRO Marker -->
    <a-marker preset="hiro">

      <!-- YOUR MODEL (UNCOMMENT AFTER TESTING) -->
      
      <a-entity
        gltf-model="Angkorwat.glb"
        scale="0.0002 0.0002 0.0002"
        position="0 0 0">
      </a-entity>

    </a-marker>

    <!-- Camera -->
    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>

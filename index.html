<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>7 Wonders AR</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#ui{
position:absolute;
top:10px;
left:10px;
z-index:10;
display:flex;
gap:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:white;
font-weight:bold;
cursor:pointer;
}

button.active{
background:#4CAF50;
color:white;
}

#infoBox{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.8);
color:white;
padding:20px;
border-radius:10px;
display:none;
max-width:300px;
text-align:center;
}

#exitBtn{
margin-top:10px;
background:red;
color:white;
}

</style>
</head>

<body>

<!-- MODEL SWITCH UI -->
<div id="ui">
<button id="tajBtn" class="active" onclick="showTaj()">Taj Mahal</button>
<button id="angkorBtn" onclick="showAngkor()">Angkor Wat</button>
</div>

<!-- INFO PANEL -->
<div id="infoBox">
<p id="infoText"></p>
<button id="exitBtn" onclick="closeInfo()">Exit</button>
</div>

<a-scene
embedded
vr-mode-ui="enabled:false"
arjs="trackingMethod:best; sourceType:webcam; debugUIEnabled:false">

<a-assets>

<!-- MODELS -->
<a-asset-item id="tajModel" src="Tajtexturedfinal.glb"></a-asset-item>
<a-asset-item id="angkorModel" src="models/TajtextureFinalfr.glb"></a-asset-item>

<!-- AUDIO FILES -->

<!-- TAJ -->
<audio id="taj_en" src="Tajmahal-audio.mp3"></audio>
<audio id="taj_ta" src="Ttajmahal.mp3"></audio>

<!-- ANGKOR -->
<audio id="angkor_en" src="AnkgorWat-audio.mp3"></audio>
<audio id="angkor_ta" src="Tangkorwat.mp3"></audio>

</a-assets>

<a-marker preset="hiro">

<!-- TAJ MODEL -->
<a-entity id="tajGroup">

<a-entity
id="taj"
gltf-model="#tajModel"
scale="0.5 0.5 0.5"
animation="property: rotation; to:0 360 0; loop:true; dur:8000">
</a-entity>

</a-entity>

<!-- ANGKOR MODEL -->
<a-entity id="angkorGroup" visible="false">

<a-entity
id="angkor"
gltf-model="#angkorModel"
scale="0.5 0.5 0.5"
animation="property: rotation; to:0 360 0; loop:true; dur:8000">
</a-entity>

</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>

/* LANGUAGE SETUP */

let userLang = localStorage.getItem("audioLang");

if(!userLang){

let choice = prompt("Choose audio language: English or Tamil");

if(choice && choice.toLowerCase().includes("tamil")){
userLang="ta";
}else{
userLang="en";
}

localStorage.setItem("audioLang", userLang);

}

/* AUDIO PLAYER */

function playAudio(place){

document.querySelectorAll("audio").forEach(a=>{
a.pause();
a.currentTime=0;
});

let audioID="";

if(place==="taj"){
audioID = userLang==="ta" ? "taj_ta" : "taj_en";
}

if(place==="angkor"){
audioID = userLang==="ta" ? "angkor_ta" : "angkor_en";
}

document.getElementById(audioID).play();

}

/* MODEL SWITCH */

function showTaj(){

document.getElementById("tajGroup").setAttribute("visible",true);
document.getElementById("angkorGroup").setAttribute("visible",false);

document.getElementById("tajBtn").classList.add("active");
document.getElementById("angkorBtn").classList.remove("active");

}

function showAngkor(){

document.getElementById("tajGroup").setAttribute("visible",false);
document.getElementById("angkorGroup").setAttribute("visible",true);

document.getElementById("tajBtn").classList.remove("active");
document.getElementById("angkorBtn").classList.add("active");

}

/* INFO BOX */

function showInfo(text){

document.getElementById("infoText").innerText=text;
document.getElementById("infoBox").style.display="block";

}

function closeInfo(){

document.getElementById("infoBox").style.display="none";

}

/* MARKER EVENT */

let marker = document.querySelector("a-marker");

marker.addEventListener("markerFound",()=>{

let tajVisible = document.getElementById("tajGroup").getAttribute("visible");

if(tajVisible){

playAudio("taj");

showInfo("The Taj Mahal was built in 1632 by Shah Jahan.");

}else{

playAudio("angkor");

showInfo("Angkor Wat is the largest religious monument in the world.");

}

});

</script>

</body>
</html>

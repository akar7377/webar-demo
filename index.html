<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Monument Demo</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

  <!-- Simple UI Overlay -->
  <div id="ui" style="
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 10;
  font-family: Arial;
  background: rgba(0,0,0,0.6);
  padding: 10px;
  border-radius: 8px;
  color: white;">

  <div style="margin-bottom: 8px;">Choose Monument:</div>

  <button onclick="showTaj()">Taj Mahal</button>
  <button onclick="showAngkor()">Angkor Wat</button>

</div>

  <a-scene
      embedded
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; debugUIEnabled: false;">

      <!-- YOUR MODEL (UNCOMMENT AFTER TESTING) -->
      
      <a-marker preset="hiro">

  <!-- Taj Mahal -->
  <a-entity
    id="taj"
    gltf-model="models/taj.glb"
    scale="0.0002 0.0002 0.0002"
    position="0 0 0"
    visible="true">
  </a-entity>

  <!-- Angkor Wat -->
  <a-entity
    id="angkor"
    gltf-model="models/angkorwat.glb"
    scale="0.0002 0.0002 0.0002"
    position="0 0 0"
    visible="false">
  </a-entity>

</a-marker>

    <!-- Camera -->
    <a-entity camera></a-entity>

  </a-scene>

  <script>
function showTaj() {
  document.getElementById("taj").setAttribute("visible", true);
  document.getElementById("angkor").setAttribute("visible", false);
}

function showAngkor() {
  document.getElementById("taj").setAttribute("visible", false);
  document.getElementById("angkor").setAttribute("visible", true);
}
</script>
</body>
</html>

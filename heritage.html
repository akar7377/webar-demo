<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Wonders of the World AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body{
margin:0;
overflow:hidden;
background:#1C1A18;
font-family:Georgia, serif;
}

.title{
position:fixed;
top:20px;
width:100%;
text-align:center;
color:#F3EBDD;
font-size:24px;
letter-spacing:3px;
z-index:10;
}

#ui{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:12px;
background:rgba(0,0,0,0.5);
padding:15px;
border-radius:10px;
z-index:999;
}

.model-btn{
padding:10px 20px;
border:1px solid #C6A75E;
background:#3A2F23;
color:#F3EBDD;
cursor:pointer;
border-radius:6px;
}

#langUI{
position:fixed;
top:70px;
left:50%;
transform:translateX(-50%);
background:#2A2520;
padding:15px 20px;
border-radius:8px;
color:white;
z-index:20;
text-align:center;
}

#langUI button{
margin:6px;
padding:8px 16px;
border:none;
background:#C6A75E;
color:black;
border-radius:6px;
cursor:pointer;
}

#exitHTML{
position:fixed;
bottom:120px;
left:50%;
transform:translateX(-50%);
padding:12px 25px;
background:red;
color:white;
border:none;
border-radius:8px;
font-size:16px;
display:none;
z-index:999;
}

.active{
background:#C6A75E;
color:black;
}
</style>
</head>

<body>

<div class="title">Wonders of the World AR</div>

<div id="langUI">
<p>Select Audio Language</p>
<button onclick="setLanguage('en')">English</button>
<button onclick="setLanguage('ta')">தமிழ்</button>
</div>

<div id="ui">
<button id="tajBtn" class="model-btn active" onclick="showTaj()">Taj Mahal</button>
<button id="angkorBtn" class="model-btn" onclick="showAngkor()">Angkor Wat</button>
<button id="exitHTML" onclick="exitHotspot()">EXIT</button>
</div>

<a-scene embedded vr-mode-ui="enabled:false"
arjs="sourceType:webcam; debugUIEnabled:false;">

<a-assets>

<audio id="taj_en" src="audio/Tajmahal.mp3"></audio>
<audio id="taj_ta" src="audio/Ttajmahal.mp3"></audio>

<audio id="tajHotspot_en" src="audio/Tajmahalhot.mp3"></audio>
<audio id="tajHotspot_ta" src="audio/Ttajmari.mp3"></audio>

<audio id="angkor_en" src="audio/AnkgorWat.mp3"></audio>
<audio id="angkor_ta" src="audio/Tangkorwat.mp3"></audio>

<audio id="angkorHotspot_en" src="audio/AnkgorTemple.mp3"></audio>
<audio id="angkorHotspot_ta" src="audio/Tangkortemple.mp3"></audio>

</a-assets>

<a-marker preset="hiro">

<!-- TAJ -->
<a-entity id="tajGroup" visible="true">

<a-entity
id="taj"
gltf-model="Tajtexturedfinal.glb"
scale="0.2 0.2 0.2"
position="0 -0.3 0"
animation__rise="property: position; from:0 -0.3 0; to:0 0 0; dur:2000; startEvents:startAnim">
</a-entity>

</a-entity>

<!-- ANGKOR -->

<a-entity id="angkorGroup" visible="false">

<a-entity
id="angkor"
gltf-model="models/TajtextureFinalfr.glb"
scale="0.02 0.02 0.02"
position="0 -0.5 0"
animation__rise="property: position; from:0 -0.3 0; to:0 0 0; dur:2000; startEvents:startAnim">
</a-entity>

<a-sphere
position="0 0.27 0"
radius="0.03"
color="blue"
animation="property: scale; to: 1.3 1.3 1.3; dir: alternate; loop: true; dur: 900"
class="clickable"
hotspot="text: The towers are designed to resemble lotus buds, a sacred symbol in Asian cultures."
audio="angkorHotspot">
</a-sphere>

<a-sphere
position="0.4 0.2 0.3"
radius="0.03"
color="blue"
animation="property: scale; to: 1.3 1.3 1.3; dir: alternate; loop: true; dur: 900"
class="clickable"
hotspot="text: Angkor Wat is the largest religious monument in the world, covering about 162 hectares."
audio="angkorHotspot">
</a-sphere>

</a-entity>

</a-marker>

<!-- CAMERA -->

<a-entity camera look-controls>

<a-cursor
raycaster="objects: .clickable"
fuse="true"
fuse-timeout="800"
material="color:white">
</a-cursor>

<a-entity id="infoBox" position="0 -0.1 -1.8" visible="false">

<a-plane width="0.7" height="0.25" color="#111" opacity="0"></a-plane>

<a-text
id="infoText"
value=""
align="center"
color="white"
width="0.6"
wrap-count="26"
position="0 0 0.01">
</a-text>

</a-entity>

<a-text
id="exitText"
value="EXIT"
align="center"
color="white"
width="2"
position="0 -0.45 -1.79"
visible="false">
</a-text>

</a-entity>
</a-scene>

<script>

/* LANGUAGE SYSTEM */

let userLang = localStorage.getItem("audioLang") || "en"

if(localStorage.getItem("audioLang")){
document.getElementById("langUI").style.display="none"
}

function setLanguage(lang){
userLang = lang
localStorage.setItem("audioLang",lang)
document.getElementById("langUI").style.display="none"
}

/* GLOBAL AUDIO FUNCTION */

function playAudio(audioId){

document.querySelectorAll("audio").forEach(a=>{
a.pause()
a.currentTime=0
})

let audio = document.querySelector("#"+audioId+"_"+userLang)

if(audio){
audio.play()
}

}

/* HOTSPOT COMPONENT */

AFRAME.registerComponent("hotspot",{

schema:{text:{type:"string"}},

init:function(){

this.el.addEventListener("click",()=>{

let text=document.querySelector("#infoText")
let box=document.querySelector("#infoBox")

let taj=document.querySelector("#taj")
let angkor=document.querySelector("#angkor")

let audioName=this.el.getAttribute("audio")

playAudio(audioName)

text.setAttribute("value",this.data.text)

box.setAttribute("visible",true)

document.getElementById("exitHTML").style.display="block";

/* ZOOM */

if(document.querySelector("#tajGroup").getAttribute("visible")){
taj.setAttribute("animation","property: scale; to:0.35 0.35 0.35; dur:600")
}

if(document.querySelector("#angkorGroup").getAttribute("visible")){
angkor.setAttribute("animation","property: scale; to:0.05 0.05 0.05; dur:600")
}

})

}

})

/* EXIT BUTTON */

function exitHotspot(){

document.querySelector("#infoBox").setAttribute("visible",false)

document.getElementById("exitHTML").style.display="none"

let taj=document.querySelector("#taj")
let angkor=document.querySelector("#angkor")

if(taj) taj.setAttribute("scale","0.2 0.2 0.2")
if(angkor) angkor.setAttribute("scale","0.02 0.02 0.02")

}

/* MARKER FOUND */

document.querySelector("a-marker").addEventListener("markerFound",()=>{

let taj=document.querySelector("#taj")
let angkor=document.querySelector("#angkor")

if(document.querySelector("#tajGroup").getAttribute("visible")){
taj.emit("startAnim")
playAudio("taj")
}

if(document.querySelector("#angkorGroup").getAttribute("visible")){
angkor.emit("startAnim")
playAudio("angkor")
}

})

/* MODEL SWITCH */

function showTaj(){

document.querySelector("#tajGroup").setAttribute("visible",true)
document.querySelector("#angkorGroup").setAttribute("visible",false)

document.getElementById("tajBtn").classList.add("active")
document.getElementById("angkorBtn").classList.remove("active")

}

function showAngkor(){

document.querySelector("#tajGroup").setAttribute("visible",false)
document.querySelector("#angkorGroup").setAttribute("visible",true)

document.getElementById("tajBtn").classList.remove("active")
document.getElementById("angkorBtn").classList.add("active")

}

/* TAJ HOTSPOTS */

document.querySelector("#taj").addEventListener("model-loaded",function(){

let taj=document.querySelector("#taj")

function createHotspot(pos,text){

let s=document.createElement("a-sphere")

s.setAttribute("position",pos)
s.setAttribute("radius","0.3")
s.setAttribute("color","red")
s.setAttribute("class","clickable")
s.setAttribute("hotspot","text:"+text)
s.setAttribute("animation","property: scale; to: 1.3 1.3 1.3; dir:alternate; loop: true; dur: 900")
s.setAttribute("audio","tajHotspot")

taj.appendChild(s)

}

createHotspot("0 2 0","")
createHotspot("3.25 1 3.75","Each minaret is slightly tilted outward, designed so that if an earthquake occurs, they fall away from the main tomb.")
createHotspot("0 -2 8","The four sections symbolize the four rivers of paradise described in Islamic tradition.")

})

</script>

</body>
</html>
